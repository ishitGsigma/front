<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emotion Mirror</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0f;
      color: white;
      text-align: center;
      padding: 20px;
    }

    video {
      width: 100%;
      max-width: 400px;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #startBtn { background: #7c6af7; color: white; }
    #detectBtn { background: #f76a8a; color: white; display: none; }

    .track {
      display: block;
      margin-top: 8px;
      color: #fff;
      text-decoration: none;
      background: #1a1a22;
      padding: 8px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<h1>Emotion Mirror</h1>

<video id="video" autoplay playsinline></video>

<canvas id="canvas" style="display:none;"></canvas>

<br>

<button id="startBtn" onclick="startCamera()">Start Camera</button>
<button id="detectBtn" onclick="detectEmotion()">Detect Emotion</button>

<p id="status"></p>

<div id="results"></div>

<script>
const BACKEND_URL = "https://ishitgovilcoder-emotion-mirror-updated1.hf.space";

let stream;

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({ video: true });
  document.getElementById("video").srcObject = stream;
  document.getElementById("detectBtn").style.display = "inline-block";
  setStatus("Camera ready");
}

async function detectEmotion() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);

  const image = canvas.toDataURL("image/jpeg").split(",")[1];

  setStatus("Detecting...");

  const res = await fetch(BACKEND_URL + "/detect", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ image })
  });

  const data = await res.json();

  show(data);
}

function show(data) {
  const div = document.getElementById("results");

  div.innerHTML =
    "<h3>" + data.emotion + "</h3>" +
    "<p>" + Math.round((data.confidence || 0) * 100) + "%</p>" +
    "<h4>Tracks</h4>" +
    (data.tracks || []).map(t =>
      "<a class='track' href='" + t.spotify_url + "' target='_blank'>" +
      t.name + " - " + t.artist +
      "</a>"
    ).join("");
}

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}
</script>

</body>
</html>
