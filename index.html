<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emotion Finder</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #1e293b, #020617);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 90%;
      max-width: 600px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.2rem;
      background: linear-gradient(90deg, #3b82f6, #22c55e);
      -webkit-background-clip: text;
      color: transparent;
    }

    p {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 15px;
      border-radius: 12px;
      border: none;
      outline: none;
      resize: none;
      font-size: 1rem;
      background: rgba(255,255,255,0.08);
      color: white;
      margin-bottom: 20px;
    }

    textarea::placeholder {
      color: #64748b;
    }

    button {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #22c55e);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(59,130,246,0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(59,130,246,0.6);
    }

    .result {
      margin-top: 25px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      display: none;
    }

    .emotion {
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: #60a5fa;
    }

    .confidence {
      color: #94a3b8;
    }

    footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>

</head>

<body>

  <div class="container">
    <h1>🧠 Emotion Finder</h1>
    <p>Type a sentence and detect the emotion behind it</p>

```
<textarea id="inputText" placeholder="e.g. I feel amazing today!"></textarea>

<button onclick="analyzeEmotion()">Analyze Emotion</button>

<div class="result" id="resultBox">
  <div class="emotion" id="emotionText"></div>
  <div class="confidence" id="confidenceText"></div>
</div>

<footer>Built with ⚡</footer>
```

  </div>

  <script>
    function analyzeEmotion() {
      const text = document.getElementById("inputText").value.toLowerCase();
      const resultBox = document.getElementById("resultBox");
      const emotionText = document.getElementById("emotionText");
      const confidenceText = document.getElementById("confidenceText");

      if (!text.trim()) {
        alert("Please enter some text");
        return;
      }

      let emotion = "Neutral";
      let confidence = Math.floor(Math.random() * 20) + 70;

      if (text.includes("happy") || text.includes("love") || text.includes("great")) {
        emotion = "😊 Happy";
      } else if (text.includes("sad") || text.includes("bad") || text.includes("depressed")) {
        emotion = "😢 Sad";
      } else if (text.includes("angry") || text.includes("hate")) {
        emotion = "😡 Angry";
      } else if (text.includes("excited")) {
        emotion = "🤩 Excited";
      }

      emotionText.innerText = "Emotion: " + emotion;
      confidenceText.innerText = "Confidence: " + confidence + "%";

      resultBox.style.display = "block";
    }
  </script>

</body>
</html>
