```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emotion Mirror</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --border: #1e1e2e;
      --accent: #7c6af7;
      --accent2: #f76a8a;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --green: #4ade80;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      color: var(--muted);
      margin-top: 8px;
    }

    .main-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .camera-wrapper {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #0d0d14;
      aspect-ratio: 4/3;
      border: 1px solid var(--border);
    }

    video, canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    canvas { display: none; }

    .btn-row {
      display: flex;
      gap: 12px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
    }

    #startBtn {
      background: var(--accent);
      color: white;
    }

    #captureBtn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      display: none;
    }

    #status {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      min-height: 20px;
    }

    .track-item {
      display: block;
      padding: 10px;
      margin-top: 8px;
      background: #0d0d14;
      border-radius: 10px;
      color: white;
      text-decoration: none;
    }

    .url-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .url-row input {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0d0d14;
      color: white;
    }
  </style>
</head>

<body>

<header>
  <h1>Emotion Mirror</h1>
  <p>Detect your emotion and get music recommendations</p>
</header>

<div class="main-card">

  <!-- Backend URL -->
  <div class="url-row">
    <label>Backend:</label>
    <input id="backendUrl" value="https://ishitgovilcoder-emotion-mirror-updated1.hf.space"/>
  </div>

  <!-- Camera -->
  <div class="camera-wrapper">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button id="startBtn" onclick="startCamera()">Start Camera</button>
    <button id="captureBtn" onclick="capture()" disabled>Detect Emotion</button>
  </div>

  <div id="status"></div>

  <div id="results"></div>

</div>

<script>
let stream;

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({ video: true });
  document.getElementById("video").srcObject = stream;

  document.getElementById("captureBtn").style.display = "block";
  document.getElementById("captureBtn").disabled = false;

  setStatus("Camera started");
}

async function capture() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);

  const image = canvas.toDataURL("image/jpeg").split(",")[1];

  const backend = document.getElementById("backendUrl").value.trim();

  setStatus("Detecting emotion...");

  try {
    const res = await fetch(`${backend}/detect`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image })
    });

    const data = await res.json();

    show(data);

  } catch (err) {
    setStatus("Error: " + err.message);
  }
}

function show(data) {
  const div = document.getElementById("results");

  const tracks = data.tracks || [];

  div.innerHTML = `
    <h3>Emotion: ${data.emotion}</h3>
    <p>Confidence: ${Math.round((data.confidence || 0) * 100)}%</p>
    <h4>Tracks:</h4>
    ${tracks.map(t => `
      <a class="track-item" href="${t.spotify_url}" target="_blank">
        🎵 ${t.name} - ${t.artist}
      </a>
    `).join("")}
  `;

  setStatus("Done");
}

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}
</script>

</body>
</html>
