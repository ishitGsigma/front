<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emotion Mirror</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "DM Sans", sans-serif;
      background: radial-gradient(circle at top, #151522, #050507);
      color: #e8e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-family: "Syne", sans-serif;
      font-size: 2.8rem;
      background: linear-gradient(135deg, #7c6af7, #f76a8a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    header p {
      color: #aaa;
    }

    .card {
      width: 100%;
      max-width: 540px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    .card:hover {
      box-shadow: 0 0 60px rgba(124,106,247,0.2);
    }

    video, canvas {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    canvas { display: none; }

    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    #startBtn {
      background: #7c6af7;
      color: white;
    }

    #startBtn:hover {
      background: #6a5af0;
    }

    #detectBtn {
      background: linear-gradient(135deg, #7c6af7, #f76a8a);
      color: white;
      display: none;
    }

    #detectBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(247,106,138,0.5);
    }

    #status {
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      color: #aaa;
    }

    #results {
      margin-top: 15px;
    }

    .track {
      display: block;
      background: rgba(255,255,255,0.05);
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      color: white;
      text-decoration: none;
      transition: 0.2s;
    }

    .track:hover {
      background: rgba(124,106,247,0.2);
      transform: translateX(5px);
    }

    h3, h4 {
      margin-top: 10px;
    }
  </style>

</head>

<body>

<header>
  <h1>Emotion Mirror</h1>
  <p>Detect your emotion and get music 🎧</p>
</header>

<div class="card">

<video id="video" autoplay playsinline></video> <canvas id="canvas"></canvas>

<button class="btn" id="startBtn" onclick="startCamera()">Start Camera</button> <button class="btn" id="detectBtn" onclick="detectEmotion()">Detect Emotion</button>

  <div id="status"></div>
  <div id="results"></div>

</div>

<script>
const BACKEND_URL = "https://ishitgovilcoder-emotion-mirror-updated1.hf.space";

let stream;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    document.getElementById("video").srcObject = stream;

    document.getElementById("detectBtn").style.display = "block";
    setStatus("Camera ready ✔");
  } catch (err) {
    setStatus("Camera error: " + err.message);
  }
}

async function detectEmotion() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const image = canvas.toDataURL("image/jpeg").split(",")[1];

  setStatus("Detecting emotion...");

  try {
    const res = await fetch(`${BACKEND_URL}/detect`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image })
    });

    const data = await res.json();
    showResults(data);

  } catch (err) {
    setStatus("Error: " + err.message);
  }
}

function showResults(data) {
  const div = document.getElementById("results");

  const tracks = data.tracks || [];

  div.innerHTML = `
    <h3>Emotion: ${data.emotion}</h3>
    <p>Confidence: ${Math.round((data.confidence || 0) * 100)}%</p>
    <h4>Recommended Tracks:</h4>
    ${tracks.map(t => `
      <a class="track" href="${t.spotify_url}" target="_blank">
        🎵 ${t.name} - ${t.artist}
      </a>
    `).join("")}
  `;

  setStatus("Done ✔");
}

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}
</script>

</body>
</html>
