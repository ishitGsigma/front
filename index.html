<body>

<header>
  <h1>Emotion Mirror</h1>
  <p>Detect your emotion and get music 🎧</p>
</header>

<div class="card">

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <button class="btn" id="startBtn" onclick="startCamera()">Start Camera</button>
  <button class="btn" id="detectBtn" onclick="detectEmotion()">Detect Emotion</button>

  <div id="status"></div>
  <div id="results"></div>

</div>

<script>
const BACKEND_URL = "https://ishitgovilcoder-emotion-mirror-updated1.hf.space";

let stream;

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({ video: true });
  document.getElementById("video").srcObject = stream;

  document.getElementById("detectBtn").style.display = "block";
  setStatus("Camera ready ✔");
}

async function detectEmotion() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);

  const image = canvas.toDataURL("image/jpeg").split(",")[1];

  setStatus("Detecting emotion...");

  try {
    const res = await fetch(`${BACKEND_URL}/detect`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image })
    });

    const data = await res.json();

    showResults(data);

  } catch (err) {
    setStatus("Error: " + err.message);
  }
}

function showResults(data) {
  const div = document.getElementById("results");

  const tracks = data.tracks || [];

  div.innerHTML = `
    <h3>Emotion: ${data.emotion}</h3>
    <p>Confidence: ${Math.round((data.confidence || 0) * 100)}%</p>
    <h4>Recommended Tracks:</h4>
    ${tracks.map(t => `
      <a class="track" href="${t.spotify_url}" target="_blank">
        🎵 ${t.name} - ${t.artist}
      </a>
    `).join("")}
  `;

  setStatus("Done ✔");
}

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}
</script>

</body>
</html>
